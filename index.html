<!DOCTYPE html>
<html lang="zxx">
    <head>
        <title>TATAPNHOB</title>
        <link href="styles/style.css" rel="stylesheet"/>
        <link href="styles/darktheme.css" rel="stylesheet" disabled/>
        <link rel="shortcut icon" href="./img/sign.ico" type="image/x-icon"/>
    </head>
    <body onload="localstoragesetup();">
        <!-- <img id="bg-logo" src="img/logo.svg"/> -->
        <img src="img/moon.svg" id="modewidget" onclick="togglemodes();"/>
        <div id="contentwrapper">
            <header>
                <img class="logo" src="img/logo.svg"/>
                <nav>
                    <ul>
                        <li><a href="#">about me</a></li>
                        <li><a href="#">my stuff</a></li>
                        <li><a href="#">contacts</a></li>
                        <li><a href="#">my respects</a></li>
                        <li><a href="#"><b>resume</b></a></li>
                    </ul>
                </nav>
            </header>
            <div id="content">
                <h1>work in progress...</h1>
                <img src="img/wip-lines.svg" class="wiplines"/>
            </div> 
            <footer></footer>
        </div>
        <script>
            function togglemodes() {
                if (localStorage.mode == 'light') {
                turnondark();
                localStorage.mode = 'dark';
                }
                else {
                    turnonlight();
                localStorage.mode = 'light';
                }
            }
            function localstoragesetup() {
                localStorage.setItem('mode','light');
            }
            function turnondark() {
                document.getElementsByTagName('link')[1].removeAttribute('disabled');
                
                document.getElementsByClassName('logo')[0].setAttribute('src','img/logo-white.svg');
                document.getElementById('modewidget').setAttribute('src','img/sun.svg');
            }
            function turnonlight() {
                
                document.getElementsByTagName('link')[1].setAttribute('disabled','true');
                
                document.getElementsByClassName('logo')[0].setAttribute('src','img/logo.svg');
                document.getElementById('modewidget').setAttribute('src','img/moon.svg');
            }
        </script>
    </body>
</html>
