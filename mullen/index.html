        <script src="./js/noise.js"></script>
        <script>
            function setup() {
                localStorage.mode = 'light';
            }
            function togglemodes() {
                switch (localStorage.mode) {
                    case 'light':
                    default:
                        localStorage.mode = 'dark';
                        document.getElementsByClassName('impulse')[0].classList.remove('flipped-2');
                        document.getElementsByClassName('impulse')[0].classList.add('flipped');
                        document.getElementsByClassName('impulse')[0].classList.add('white-logo');
                    break;
                    case 'dark':
                        localStorage.mode = 'light';
                        document.getElementsByClassName('impulse')[0].classList.remove('flipped');
                        document.getElementsByClassName('impulse')[0].classList.add('flipped-2');
                        document.getElementsByClassName('impulse')[0].classList.remove('white-logo');
                    break;
                }
                document.getElementsByTagName('link')[1].toggleAttribute('disabled');
            }
        </script>
    </body>
